<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#08071A"/>
      <stop offset="50%" style="stop-color:#0D0B28"/>
      <stop offset="100%" style="stop-color:#090718"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5B21B6;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E2D9FE"/>
      <stop offset="50%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#C084FC"/>
    </linearGradient>
    <radialGradient id="radial1" cx="30%" cy="20%" r="50%">
      <stop offset="0%" style="stop-color:#5B21B6;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#5B21B6;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="radial2" cx="80%" cy="80%" r="40%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#radial1)"/>
  <rect width="1200" height="630" fill="url(#radial2)"/>

  <!-- 장식선 -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#titleGrad)" opacity="0.6"/>
  <rect x="80" y="80" width="1" height="470" fill="#7C3AED" opacity="0.15"/>
  <rect x="1120" y="80" width="1" height="470" fill="#7C3AED" opacity="0.15"/>

  <!-- 로고 박스 -->
  <rect x="80" y="100" width="72" height="72" rx="18" fill="#5B21B6" opacity="0.9"/>
  <text x="116" y="148" text-anchor="middle" font-size="34" fill="white">✦</text>

  <!-- 브랜드명 -->
  <text x="172" y="131" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" letter-spacing="4" fill="#8B5CF6">PIL</text>
  <text x="237" y="131" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" letter-spacing="4" fill="#475569">TOP</text>
  <text x="172" y="154" font-family="Arial, sans-serif" font-size="11" letter-spacing="5" fill="#6D4AAA" opacity="0.7">CAREER COMPASS</text>

  <!-- 메인 타이틀 -->
  <text x="80" y="300" font-family="Arial, sans-serif" font-size="62" font-weight="900" fill="url(#titleGrad)">나의 진로를 발견하는</text>
  <text x="80" y="380" font-family="Arial, sans-serif" font-size="62" font-weight="900" fill="url(#titleGrad)">여정</text>

  <!-- 서브 텍스트 -->
  <text x="80" y="450" font-family="Arial, sans-serif" font-size="22" fill="#A78BFA" opacity="0.75" letter-spacing="2">Holland RIASEC · Gardner MI · MBTI · 직업가치관</text>

  <!-- 뱃지들 -->
  <rect x="80" y="500" width="120" height="38" rx="19" fill="#5B21B6" opacity="0.25"/>
  <rect x="80" y="500" width="120" height="38" rx="19" fill="none" stroke="#7C3AED" stroke-width="1" opacity="0.5"/>
  <text x="140" y="524" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#C4B5FD">📋 60문항</text>

  <rect x="216" y="500" width="130" height="38" rx="19" fill="#5B21B6" opacity="0.25"/>
  <rect x="216" y="500" width="130" height="38" rx="19" fill="none" stroke="#7C3AED" stroke-width="1" opacity="0.5"/>
  <text x="281" y="524" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#C4B5FD">⏱ 약 10분</text>

  <rect x="362" y="500" width="140" height="38" rx="19" fill="#5B21B6" opacity="0.25"/>
  <rect x="362" y="500" width="140" height="38" rx="19" fill="none" stroke="#7C3AED" stroke-width="1" opacity="0.5"/>
  <text x="432" y="524" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#C4B5FD">💾 자동저장</text>

  <!-- 우측 장식 원 -->
  <circle cx="980" cy="315" r="180" fill="#5B21B6" opacity="0.06"/>
  <circle cx="980" cy="315" r="130" fill="#5B21B6" opacity="0.06"/>
  <circle cx="980" cy="315" r="80" fill="#5B21B6" opacity="0.08"/>
  <text x="980" y="340" text-anchor="middle" font-size="72" fill="#8B5CF6" opacity="0.35">✦</text>
</svg>
