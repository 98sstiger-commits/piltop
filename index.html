const S = {
  async get(k) {
    if (sbReady) { try { const {data}=await sb.from('piltop_data').select('value').eq('key',k).maybeSingle(); if(data)return data.value; } catch(e){} }
    try { const v=localStorage.getItem(k); if(v)return JSON.parse(v); } catch{}
    return null;
  },
  async set(k,v) {
    if (sbReady) { try { await sb.from('piltop_data').upsert({key:k,value:v,updated_at:new Date().toISOString()}); } catch(e){} }
    try { localStorage.setItem(k,JSON.stringify(v)); } catch{}
  },
  async del(k) {
    if (sbReady) { try { await sb.from('piltop_data').delete().eq('key',k); } catch(e){} }
    try { localStorage.removeItem(k); } catch{}
  }
};

// ═══════════════════════════════

function analyze(answers, mbtiMode, mbtiKnown) {
  const calcAvg = (qs, dims) => {
    const sc={}, cnt={};
    dims.forEach(d=>{sc[d]=0;cnt[d]=0;});
    qs.forEach(q=>{const v=answers[q.id]; if(v!==undefined&&sc[q.d]!==undefined){sc[q.d]+=Number(v);cnt[q.d]++;}});
    dims.forEach(d=>{if(cnt[d]>0)sc[d]=parseFloat((sc[d]/cnt[d]).toFixed(2));});
    return Object.entries(sc).sort(([,a],[,b])=>b-a).map(([k,v])=>({key:k,score:v}));
  };
  const riasec=calcAvg(RQ,["R","I","A","S","E","C"]);
  const mi=calcAvg(MQ,["LI","LM","SP","MU","BK","IP","IA","NA"]);
  const tend=calcAvg(TQ,["HU","SO","SC","EN","AR","ME"]);
  const vals={};
  VQ.forEach(q=>{if(answers[q.id]!==undefined)vals[q.d]=Number(answers[q.id]);});
  const valueTop=Object.entries(vals).sort(([,a],[,b])=>b-a).slice(0,3).map(([k])=>k);

  let mbtiType="";
  if(mbtiMode==="input") mbtiType=mbtiKnown.toUpperCase();
  else if(mbtiMode==="test"){
    const c={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
    BQ.forEach(q=>{const ans=answers[q.id];if(!ans)return;c[ans==="A"?q.av:q.bv]++;});
    mbtiType=`${c.E>=c.I?"E":"I"}${c.S>=c.N?"S":"N"}${c.T>=c.F?"T":"F"}${c.J>=c.P?"J":"P"}`;
  }

  const r1=riasec[0]?.key, r2=riasec[1]?.key, r3=riasec[2]?.key;
  const mi1=mi[0]?.key, mi2=mi[1]?.key, tend1=tend[0]?.key, tend2=tend[1]?.key;

  // ── 전공/직업 추천 (패턴 기반 교차분석) ──
  const majorSet=new Set(), jobSet=new Set();
  RM[r1]?.majors?.slice(0,4).forEach(m=>majorSet.add(m));
  RM[r2]?.majors?.slice(0,3).forEach(m=>majorSet.add(m));
  MM[mi1]?.majors?.slice(0,3).forEach(m=>majorSet.add(m));
  MM[mi2]?.majors?.slice(0,2).forEach(m=>majorSet.add(m));
  RM[r1]?.jobs?.slice(0,4).forEach(j=>jobSet.add(j));
  RM[r2]?.jobs?.slice(0,3).forEach(j=>jobSet.add(j));

  // ── 패턴 상담 포인트 ──
  const pts=[];
  const patterns=[
    {cond:r1==="I"&&["LM","NA"].includes(mi1), msg:"수리·과학 탐구형 → 의약·이공계 연구직 강력 추천. 수능 과탐 집중 전략이 유효합니다."},
    {cond:r1==="I"&&mi1==="IP", msg:"연구+대인관계 조합 → 임상심리·사회과학·교육연구 분야 적합"},
    {cond:r1==="I"&&mi1==="LI", msg:"인문·사회 연구 성향 → 심리학·사회과학·언론학 탐색 권장"},
    {cond:r1==="A"&&mi1==="SP", msg:"시각적 창의력 우수 → 디자인·건축·영상·게임 분야 최적합"},
    {cond:r1==="A"&&mi1==="MU", msg:"음악·퍼포먼스 두드러짐 → 실용음악·공연예술·음향 분야 탐색"},
    {cond:r1==="A"&&mi1==="LI", msg:"언어+예술 조합 → 문예창작·광고카피·콘텐츠 기획 분야 강점"},
    {cond:r1==="S"&&mi1==="IP", msg:"대인관계 탁월 → 교육·상담·사회복지 분야 강점. 생기부 교육봉사·멘토링 활동 권장"},
    {cond:r1==="S"&&mi1==="IA", msg:"공감+자기성찰 → 상담심리·철학·교육학 깊이 탐색 추천"},
    {cond:r1==="E"&&mi1==="LI", msg:"리더십+언어능력 → 법·경영·정치외교·언론 적합"},
    {cond:r1==="E"&&mi1==="LM", msg:"추진력+논리 → 경제·금융·창업벤처 분야 강점"},
    {cond:r1==="R"&&mi1==="LM", msg:"공학적 사고 강함 → SW·기계·전자공학·AI 추천"},
    {cond:r1==="R"&&mi1==="BK", msg:"현장 기술+신체능력 → 스포츠과학·물리치료·산업공학 적합"},
    {cond:r1==="C"&&mi1==="LM", msg:"분석·수리 능력 탁월 → 금융·회계·통계·행정·빅데이터 적합"},
    {cond:r1==="C"&&mi1==="LI", msg:"체계+언어 조합 → 행정·법률사무·문헌정보·경영정보 적합"},
    {cond:r1==="I"&&r2==="E", msg:"연구+리더십 조합 → 의대·법대·경영대학원 등 고학력 전문직 경로 추천"},
    {cond:r1==="S"&&r2==="I", msg:"봉사+탐구 조합 → 의료·보건·임상 분야 이상적"},
    {cond:r1==="E"&&r2==="S", msg:"리더십+사람 지향 → 교육행정·인사·HR·사회적기업 적합"},
    {cond:tend1==="ME"&&["I","S"].includes(r1), msg:"의약보건계열 성향 강함 → 수능 과탐·수학 집중, 의치한약 목표 설정 권장"},
  ];
  patterns.forEach(p=>{if(p.cond)pts.push(p.msg);});
  if(pts.length===0) pts.push(`${RM[r1]?.name}+${MM[mi1]?.name} 조합 → ${RM[r1]?.stream} 심화 탐색 권장`);
  if(mbtiType.includes("J")) pts.push("J형 강점: 체계적 학습계획 수립 → 목표 기반 수시 전략 설계 추천");
  if(mbtiType.includes("N")) pts.push("N형 특성: 아이디어·창의성 중심 직군 높은 적합도 → 논술·자소서에서 강점 발휘 가능");
  if(mbtiType.includes("T")) pts.push("T형 특성: 논리·분석 기반 직군(이공계·법·금융) 적합도 상승");
  if(mbtiType.includes("F")) pts.push("F형 특성: 대인서비스·교육·상담 계열 높은 직업 만족도 예상");

  const acts=[];
  if(["I","R"].includes(r1)) acts.push(...["과학탐구실험 동아리","R&E 연구 프로젝트","코딩·SW 개발 동아리"]);
  else if(r1==="A") acts.push(...["예술·창작 동아리","교지편집부","영상·미디어 제작 동아리"]);
  else if(r1==="S") acts.push(...["교육봉사·멘토링","학교 상담 또래 도우미","사회복지 동아리"]);
  else if(r1==="E") acts.push(...["학생회 임원 활동","창업·경제 동아리","교내 토론·모의UN"]);
  else if(r1==="C") acts.push(...["수학·경제 올림피아드","통계·데이터 분석 프로젝트","자격증 취득 활동"]);
  if(acts.length<3) acts.push("독서토론 동아리","진로체험 탐방","교내 발표·탐구 활동");

  return {riasec,mi,tend,valueTop,mbtiType,r1,r2,r3,mi1,mi2,tend1,tend2,
    cross:{majors:[...majorSet].slice(0,10),jobs:[...jobSet].slice(0,8),pts,acts}};
}

//  CHARTS
// ═══════════════════════════════
function Radar({items,size=180}){
  const cx=size/2,cy=size/2,r=size*.33,n=items.length;
  const ang=i=>(i*2*Math.PI/n)-Math.PI/2;
  const pt=(i,v)=>[cx+r*(v/5)*Math.cos(ang(i)),cy+r*(v/5)*Math.sin(ang(i))];
  const poly=items.map((it,i)=>pt(i,it.score).join(",")).join(" ");
  const grids=[1,2,3,4,5];
  return(
    <svg width={size} height={size} className="radar-svg">
      {grids.map(g=>(
        <polygon key={g} points={items.map((_,i)=>pt(i,g).join(",")).join(" ")}
          fill="none" stroke="rgba(139,92,246,.12)" strokeWidth={g===5?1.5:0.8}/>
      ))}
      {items.map((_,i)=>{const[x,y]=pt(i,5);return<line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="rgba(139,92,246,.1)" strokeWidth={0.8}/>;})}
      <polygon points={poly} fill="rgba(139,92,246,.18)" stroke="rgba(167,139,250,.7)" strokeWidth={1.5}/>
      {items.map((it,i)=>{const[x,y]=pt(i,it.score);return<circle key={i} cx={x} cy={y} r={3} fill="#A78BFA"/>;})}
      {items.map((it,i)=>{
        const lr=r+22,lx=cx+lr*Math.cos(ang(i)),ly=cy+lr*Math.sin(ang(i));
        return(<g key={i}>
          <text x={lx} y={ly-3} textAnchor="middle" fontSize="12" fill="rgba(221,214,254,.9)">{it.emoji}</text>
          <text x={lx} y={ly+9} textAnchor="middle" fontSize="6.5" fill="rgba(167,139,250,.7)">{it.label}</text>
        </g>);
      })}
    </svg>
  );
}

    <div style={{marginBottom:9}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>

        <span style={{fontSize:11.5,color:rank<2?"rgba(196,181,253,.9)":"rgba(167,139,250,.45)",fontWeight:rank<2?600:400}}>{Math.round(score*20)}점</span>

          background:rank===0?color:rank===1?color+"99":"rgba(255,255,255,.14)"}}/>
      </div>
    </div>
  );
}

`;

const SECS=[
  {key:"riasec",label:"흥미 유형",sub:"Holland RIASEC",icon:"🎯",qs:RQ,type:"likert"},
  {key:"mi",label:"다중지능",sub:"Gardner MI",icon:"🧩",qs:MQ,type:"likert"},
  {key:"tend",label:"계열 성향",sub:"Academic Tendency",icon:"📐",qs:TQ,type:"likert"},
  {key:"value",label:"직업 가치관",sub:"Work Values",icon:"💎",qs:VQ,type:"likert"},
  {key:"mbti",label:"MBTI 성격 유형",sub:"Myers-Briggs",icon:"🧠",qs:[],type:"mbti"},
];

// ═══════════════════════════════
//  APP
// ═══════════════════════════════
function App(){
  const [view,setView]=useState("loading");
  const [logo,setLogo]=useState(null);
  const [token,setToken]=useState("");
  const [tokenData,setTokenData]=useState(null);
  const [info,setInfo]=useState({name:"",grade:"",school:"",studentPhone:"",parentPhone:""});
  const [secIdx,setSecIdx]=useState(0);
  const [qIdx,setQIdx]=useState(0);
  const [answers,setAnswers]=useState({});
  const [mbtiMode,setMbtiMode]=useState("none");
  const [mbtiKnown,setMbtiKnown]=useState("");
  const [animKey,setAnimKey]=useState(0);
  const [toast,setToast]=useState("");
  const [adminAuth,setAdminAuth]=useState(false);
  const [adminPw,setAdminPw]=useState("");
  const [adminErr,setAdminErr]=useState(false);
  const [adminTab,setAdminTab]=useState("subs");
  const [subs,setSubs]=useState([]);
  const [selSub,setSelSub]=useState(null);
  const [loadingAdmin,setLoadingAdmin]=useState(false);
  const [tokens,setTokens]=useState([]);
  const [newLabel,setNewLabel]=useState("");
  const logoRef=useRef();
  const toastRef=useRef();
  const activeSecs=mbtiMode==="test"?SECS:SECS.filter(s=>s.key!=="mbti");

  const showToast=msg=>{setToast(msg);clearTimeout(toastRef.current);toastRef.current=setTimeout(()=>setToast(""),2600);};
  const resultUrl=t=>`${window.location.origin}${window.location.pathname}#r/${encodeURIComponent(t)}`;
  const copyLink=async url=>{try{await navigator.clipboard.writeText(url);showToast("✅ 링크 복사됨!");}catch{showToast("링크: "+url);}};
  const adminLogin=()=>{if(adminPw===APW){setAdminAuth(true);loadAdmin();}else{setAdminErr(true);}};

  // ── 자동저장 ──
  const autoSave=useCallback(async(ans,si,qi,inf,mm,mk)=>{
    if(!token)return;
    await S.set(K.progress(token),{answers:ans,secIdx:si,qIdx:qi,info:inf,mbtiMode:mm,mbtiKnown:mk,savedAt:new Date().toISOString()});
  },[token]);

  useEffect(()=>{
    (async()=>{
      const cfg=await S.get(K.cfg());
      if(cfg?.logo)setLogo(cfg.logo);
      const hash=window.location.hash.slice(1);
      if(!hash){setView("home");return;}
      if(hash==="admin"){setView("admin");return;}
      if(hash.startsWith("r/")){
        const t=decodeURIComponent(hash.slice(2));
        const d=await S.get(K.link(t));
        if(d?.submission){setSelSub(d.submission);setView("result_pub");}
        else setView("result_notfound");
        return;
      }
      const t=decodeURIComponent(hash);
      const d=await S.get(K.link(t));
      if(!d){setView("link_invalid");return;}
      setToken(t);setTokenData(d);
      if(d.status==="used"){setSelSub(d.submission);setView("already");}
      else {
        // 이어하기: 저장된 진행상황 확인
        const prog=await S.get(K.progress(t));
        if(prog&&prog.answers&&Object.keys(prog.answers).length>0){
          setAnswers(prog.answers);
          setSecIdx(prog.secIdx||0);
          setQIdx(prog.qIdx||0);
          setInfo(prog.info||{name:"",grade:"",school:"",studentPhone:"",parentPhone:""});
          setMbtiMode(prog.mbtiMode||"none");
          setMbtiKnown(prog.mbtiKnown||"");
          setView("resume"); // 이어하기 확인 화면
        } else {
          setView("start");
        }
      }
    })();
  },[]);

  async function loadAdmin(){
    setLoadingAdmin(true);
    const ll=await S.get(K.links())||[];
    const loaded=[];
    for(const t of ll){ const d=await S.get(K.link(t)); if(d)loaded.push(d); }
    setSubs(loaded.filter(d=>d.status==="used"));
    setTokens(loaded.filter(d=>d.status!=="used"));
    setLoadingAdmin(false);
  }

  const totalQ=()=>{
    const coreQ=RQ.length+MQ.length+TQ.length+VQ.length;
    return mbtiMode==="test"?coreQ+BQ.length:coreQ;
  };
  const doneQ=()=>{
    let d=0;
    for(let i=0;i<secIdx;i++){
      const s=activeSecs[i];
      if(s.type==="likert")d+=s.qs.length;
      else if(s.type==="mbti")d+=BQ.length;
    }
    d+=qIdx;
    return d;
  };

  function advance(newAns){
    const curSec=activeSecs[secIdx];
    const qs=curSec.type==="mbti"?BQ:curSec.qs;
    const nextQ=qIdx+1;
    if(nextQ<qs.length){
      setQIdx(nextQ);
      autoSave(newAns,secIdx,nextQ,info,mbtiMode,mbtiKnown);
    } else if(secIdx<activeSecs.length-1){
      const nextSec=secIdx+1;
      setSecIdx(nextSec);setQIdx(0);
      autoSave(newAns,nextSec,0,info,mbtiMode,mbtiKnown);
    } else {
      doSubmit(newAns);
    }
  }

  function goBack(){
    if(qIdx>0){setQIdx(q=>q-1);return;}
    if(secIdx>0){
      const prevSec=activeSecs[secIdx-1];
      const qs=prevSec.type==="mbti"?BQ:prevSec.qs;
      setSecIdx(s=>s-1);setQIdx(qs.length-1);
    }
  }

  function goRestart(){
    setAnswers({});setSecIdx(0);setQIdx(0);
    if(token)S.del(K.progress(token));
  }

  function handleLikert(score){
    const curSec=activeSecs[secIdx];
    const curQ=curSec.qs[qIdx];
    const nAns={...answers,[curQ.id]:score};
    setAnswers(nAns);setAnimKey(k=>k+1);
    setTimeout(()=>advance(nAns),260);
  }
  function handleAB(ch){
    const curQ=BQ[qIdx];
    const nAns={...answers,[curQ.id]:ch};
    setAnswers(nAns);setAnimKey(k=>k+1);
    setTimeout(()=>advance(nAns),260);
  }

  async function doSubmit(allAns){
    const result=analyze(allAns,mbtiMode,mbtiKnown);
    const id=token||mkCode();
    const submission={id,token:id,submittedAt:new Date().toLocaleString("ko-KR"),info,...result};
    const record={token:id,label:info.name||tokenData?.label||id,status:"used",
      createdAt:tokenData?.createdAt||new Date().toLocaleString("ko-KR"),submission};
    await S.set(K.link(id),record);
    if(!token){const ll=await S.get(K.links())||[];if(!ll.includes(id))ll.unshift(id);await S.set(K.links(),ll);}
    await S.del(K.progress(id)); // 진행중 데이터 삭제
    setSelSub(submission);setView("done");
  }

  async function createToken(){
    if(!newLabel.trim())return;
    const t=mkCode();
    const d={token:t,label:newLabel.trim(),status:"ready",createdAt:new Date().toLocaleString("ko-KR")};
    await S.set(K.link(t),d);
    const ll=await S.get(K.links())||[];ll.unshift(t);await S.set(K.links(),ll);
    setNewLabel("");setTokens(prev=>[d,...prev]);showToast("✅ 링크 생성됨!");
  }

  async function deleteToken(t){
    await S.del(K.link(t));
    const ll=await S.get(K.links())||[];await S.set(K.links(),ll.filter(x=>x!==t));

//  RESULT VIEW
// ═══════════════════════════════
function ResultView({sub,logo,onBack,onPrint,isPublic,resultLink,copyLink}){
  const s=sub;
  const r1i=RM[s.r1],r2i=RM[s.r2],mi1i=MM[s.mi1],mi2i=MM[s.mi2],t1i=TM[s.tend1];
  const radarR=s.riasec?.map(({key,score})=>({emoji:RM[key]?.emoji||"",label:RM[key]?.name||"",score}));
  const radarMI=s.mi?.map(({key,score})=>({emoji:MM[key]?.emoji||"",label:(MM[key]?.name||"").replace("지능","").slice(0,4),score}));
  const mbtiStudy=s.mbtiType?[s.mbtiType[0],s.mbtiType[1],s.mbtiType[2],s.mbtiType[3]].map(c=>MBTI_STUDY[c]).filter(Boolean):[];



  const LogoBox=()=>(
    <div className="logo-row" style={{marginBottom:0}}>
      <div className="logo-box" style={{background:logo?"transparent":"",boxShadow:logo?"none":""}}>
        {logo?<img src={logo} alt="logo" style={{width:"100%",height:"100%",objectFit:"contain"}}/>:"✦"}
      </div>
      {!logo&&<div>
        <div className="logo-name"><span className="p">PIL</span><span className="t">TOP</span></div>
        <div className="logo-tag">Career Compass</div>
      </div>}
    </div>
  );

  return(
    <div className={`root top${isPublic?" pub":""}`}><div className={`card wide${isPublic?" pub-card":""}`}>

      {/* 헤더 */}
      {isPublic?(
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}} className="no-print">
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:42,height:42,borderRadius:10,overflow:"hidden",flexShrink:0,background:logo?"transparent":"linear-gradient(140deg,#0F766E,#14B8A6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,boxShadow:logo?"none":"0 4px 14px rgba(20,184,166,.2)"}}>
              {logo?<img src={logo} alt="logo" style={{width:"100%",height:"100%",objectFit:"contain"}}/>:"✦"}
            </div>
            {!logo&&<div>
              <div style={{fontFamily:"'Gmarket Sans',sans-serif",fontSize:15,fontWeight:700,color:"#5EEAD4"}}>진로 검사 결과</div>
              <div style={{fontSize:9,color:"rgba(94,234,212,.4)",letterSpacing:2}}>CAREER COMPASS</div>
            </div>}
          </div>
          <button className="btn btn-sm" style={{background:"linear-gradient(135deg,#0F766E,#14B8A6)",boxShadow:"0 4px 18px rgba(20,184,166,.2)"}} onClick={onPrint}>🖨 PDF 저장</button>
        </div>
      ):(
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}} className="no-print">
          <LogoBox/>
          <div style={{display:"flex",gap:8}}>
            {resultLink&&copyLink&&<button className="btn btn-g btn-sm" onClick={()=>copyLink(resultLink)}>🔗 결과공유</button>}
            <button className="btn btn-sm" onClick={onPrint}>🖨 PDF</button>
            {onBack&&<button className="btn btn-g btn-sm" onClick={onBack}>← 목록</button>}
          </div>
        </div>
      )}

      {/* 인쇄용 헤더 */}
      <div className="print-header" style={{display:"none"}}>
        <div>
          <div className="print-header-logo">{logo?<img src={logo} alt="logo" style={{height:32,objectFit:"contain",filter:"brightness(0) invert(1)"}}/>:"PILTOP Career Compass"}</div>
          <div className="print-header-sub">진로적성 종합분석 보고서</div>
        </div>
        <div className="print-header-info">검사일: {s.submittedAt}<br/>{s.info?.school&&<>{s.info.school}<br/></>}{s.info?.grade}</div>
      </div>

      {/* 학생 카드 */}
      <div className="student-card print-section" style={{display:"flex",gap:16,alignItems:"center",padding:"16px 20px",background:"rgba(91,33,182,.08)",border:"1px solid rgba(139,92,246,.2)",borderRadius:16,marginBottom:24}}>
        <div style={{fontSize:40}}>👤</div>
        <div style={{flex:1}}>
          <div style={{fontFamily:"'Gmarket Sans',sans-serif",fontSize:22,fontWeight:700,color:"#EDE9FF"}}>{s.info?.name}</div>
          <div style={{fontSize:13,color:"rgba(196,181,253,.8)",marginTop:3,lineHeight:1.8}}>
            {s.info?.grade}{s.info?.school?` · ${s.info.school}`:""}
            {s.info?.studentPhone&&<><br/>📱 {s.info.studentPhone}</>}
            {s.info?.parentPhone&&<span style={{marginLeft:12}}>학부모 {s.info.parentPhone}</span>}
          </div>
          <div style={{fontSize:11,color:"rgba(167,139,250,.5)",marginTop:3}}>제출 {s.submittedAt}</div>
        </div>
        {s.mbtiType&&<div className="mbti-box" style={{textAlign:"center",padding:"10px 16px",background:"rgba(91,33,182,.2)",border:"1px solid rgba(139,92,246,.35)",borderRadius:12,flexShrink:0}}>
          <div className="mbti-type" style={{fontFamily:"'Gmarket Sans',sans-serif",fontSize:26,fontWeight:700,color:"#C4B5FD"}}>{s.mbtiType}</div>
          <div style={{fontSize:9.5,color:"rgba(196,181,253,.6)",marginTop:3}}>{MBTI_DESC[s.mbtiType]||""}</div>
        </div>}
      </div>

      {/* Hero */}
      <div className="r-hero print-section">
        <div className="r-code">{s.r1}{s.r2}형</div>
        <div>
          <span className="pill">{r1i?.stream}</span>
          {r2i?.stream&&r2i.stream!==r1i?.stream&&<span className="pill">{r2i.stream}</span>}
          {t1i&&<span className="pill">{t1i.emoji} {t1i.name}</span>}
          {s.mbtiType&&<span className="pill">{s.mbtiType}</span>}
        </div>
        <div style={{marginTop:12,fontSize:13.5,color:"rgba(220,210,255,.8)",lineHeight:1.75}}>{r1i?.desc}</div>
      </div>

      {/* 종합 분석 요약 */}
      <div className="print-section" style={{marginBottom:20}}>
        <div className="sec-t">📋 종합 분석 요약</div>
        <div className="type-desc-box" style={{background:"rgba(91,33,182,.07)",borderLeft:"3px solid #7C3AED",borderRadius:"0 12px 12px 0",padding:"14px 18px"}}>
          <p className="type-desc-text" style={{fontSize:13.5,lineHeight:2,color:"rgba(230,220,255,.9)"}}>
            <strong style={{color:"#DDD6FE"}}>{s.info?.name}</strong>님은 <strong style={{color:"#DDD6FE"}}>{r1i?.name}({s.r1})</strong>과 <strong style={{color:"#DDD6FE"}}>{r2i?.name}({s.r2})</strong>의 복합 흥미 성향을 보입니다.
            {" "}{r1i?.fullDesc}
            {mi1i&&<>{" "}다중지능 중 <strong style={{color:"#DDD6FE"}}>{mi1i?.name}</strong>이 가장 두드러지며, {mi1i?.desc}에서 강점을 발휘합니다.</>}
            {t1i&&<>{" "}<strong style={{color:"#DDD6FE"}}>{t1i?.name}</strong> 계열 적성이 높아 이 방향을 중심으로 탐색하는 것을 권장합니다.</>}
          </p>
        </div>
      </div>

      {/* 레이더 차트 */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:20}} className="print-section radar-grid">
        {[{title:"RIASEC 흥미 유형",items:radarR},{title:"다중지능 프로파일",items:radarMI}].map(({title,items})=>(
          <div key={title} style={{background:"rgba(255,255,255,.025)",border:"1px solid rgba(139,92,246,.1)",borderRadius:14,padding:16,textAlign:"center",overflow:"hidden"}}>
            <div className="sec-t" style={{marginBottom:10}}>{title}</div>
            <div className="radar-wrap">{items&&<Radar items={items} size={185}/>}</div>
          </div>
        ))}
      </div>

      {/* 흥미 유형 상세 */}
      <div className="print-section">
        <div className="sec-t">흥미 유형 (RIASEC)</div>
        {s.riasec?.map(({key,score},i)=><Bar key={key} label={`${RM[key]?.emoji} ${RM[key]?.name}`} score={score} rank={i} color={RM[key]?.color||"#7C3AED"}/>)}
      </div>

      {/* 주요 유형 카드 — 패턴 해석 포함 */}
      <div className="print-section" style={{marginBottom:20}}>
        {[{key:s.r1,rank:1},{key:s.r2,rank:2}].map(({key,rank})=>{
          const inf=RM[key];if(!inf)return null;
          return(
            <div key={key} style={{marginBottom:12,padding:"16px 18px",background:"rgba(255,255,255,.03)",border:"1px solid rgba(139,92,246,.12)",borderRadius:14}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                <span style={{fontSize:22}}>{inf.emoji}</span>
                <span style={{fontFamily:"'Gmarket Sans',sans-serif",fontWeight:700,color:inf.color,fontSize:15}}>{rank}순위 · {inf.name}</span>
                <span style={{fontSize:11,color:"rgba(196,181,253,.55)",padding:"2px 8px",borderRadius:6,background:"rgba(255,255,255,.05)"}}>{inf.stream}</span>
              </div>
              <p style={{fontSize:13,color:"rgba(220,210,255,.85)",lineHeight:1.85,marginBottom:10}}>{inf.fullDesc}</p>
              <div style={{marginBottom:8}}>
                <span style={{fontSize:10,color:"rgba(196,181,253,.55)",letterSpacing:2,marginRight:8}}>핵심강점</span>
                {inf.strength?.map(st=><span key={st} className="strength-tag">✓ {st}</span>)}
              </div>
              <div style={{fontSize:12,color:"rgba(196,181,253,.6)"}}>📚 학습 스타일: {inf.study}</div>
            </div>
          );
        })}
      </div>
      <div className="div"/>

      {/* 다중지능 */}
      <div className="print-section">
        <div className="sec-t">다중지능 (Gardner MI)</div>
        {s.mi?.map(({key,score},i)=><Bar key={key} label={`${MM[key]?.emoji} ${MM[key]?.name}`} score={score} rank={i} color={MM[key]?.color||"#7C3AED"}/>)}
        {mi1i&&<div style={{marginTop:10,padding:"12px 14px",background:"rgba(255,255,255,.03)",borderRadius:10,border:"1px solid rgba(139,92,246,.1)",fontSize:13,color:"rgba(220,210,255,.85)",lineHeight:1.85}}>
          💡 <strong style={{color:"#DDD6FE"}}>{mi1i.name}</strong>: {mi1i.desc}
          {mi2i&&<><br/>🔹 <strong style={{color:"rgba(221,214,254,.75)"}}>{mi2i.name}</strong>: {mi2i.desc}</>}
        </div>}
      </div>
      <div className="div"/>

      {/* 계열 성향 */}
      <div className="print-section">
        <div className="sec-t">계열 성향</div>
        {s.tend?.map(({key,score},i)=><Bar key={key} label={`${TM[key]?.emoji} ${TM[key]?.name}`} score={score} rank={i} color={TM[key]?.color||"#7C3AED"}/>)}
      </div>
      <div className="div"/>

      {/* MBTI */}
      {s.mbtiType&&mbtiStudy.length>0&&<>
        <div className="print-section" style={{marginBottom:20}}>
          <div className="sec-t">🧠 MBTI 기반 학습 스타일 ({s.mbtiType})</div>
          <div style={{background:"rgba(99,102,241,.07)",border:"1px solid rgba(99,102,241,.2)",borderRadius:12,padding:"14px 16px"}}>
            <div style={{fontFamily:"'Gmarket Sans',sans-serif",fontWeight:700,color:"#C7D2FE",fontSize:15,marginBottom:10}}>{s.mbtiType} — {MBTI_DESC[s.mbtiType]}</div>
            {mbtiStudy.map((txt,i)=><div key={i} style={{fontSize:13,color:"rgba(221,214,254,.85)",lineHeight:1.9,marginBottom:6,paddingLeft:14,borderLeft:"2px solid rgba(99,102,241,.35)"}}>{txt}</div>)}
          </div>
        </div>
        <div className="div"/>
      </>}

      {/* 직업가치관 */}
      <div className="print-section sec-b">
        <div className="sec-t">직업 가치관 Top 3</div>
        <div className="tags">
          {s.valueTop?.map((v,i)=><span key={v} className={`tag${i===0?" hi":""}`}>{["🥇","🥈","🥉"][i]} {v}</span>)}
        </div>
      </div>
      <div className="div"/>

      {/* 추천 전공/직업 */}
      <div className="print-section sec-b">
        <div className="sec-t">🎯 추천 학과·전공</div>
        <div className="tags" style={{marginBottom:16}}>
          {s.cross?.majors?.map((m,i)=><span key={m} className={`tag${i<3?" hi":""}`}>{i<3?"⭐ ":""}{m}</span>)}
        </div>
        <div className="sec-t">💼 추천 직업군</div>
        <div className="tags">
          {s.cross?.jobs?.map(j=><span key={j} className="tag">✦ {j}</span>)}
        </div>
      </div>
      <div className="div"/>

      {/* 상담 포인트 (관리자 전용) */}
      {!isPublic&&<>
        <div className="print-section sec-b">
          <div className="sec-t">💬 패턴 분석 · 상담 포인트 (선생님 전용)</div>
          <div className="adv">
            <strong>핵심 프로파일: RIASEC {s.r1}{s.r2} · 주력지능 {mi1i?.name} · 계열 {t1i?.name||"—"} · MBTI {s.mbtiType||"—"}</strong>
            <br/><br/>
            {s.cross?.pts?.map((p,i)=><div key={i} style={{marginBottom:8,paddingLeft:10,borderLeft:"2px solid rgba(99,102,241,.4)"}}>📌 {p}</div>)}
            <br/>
            <strong>✦ 추천 교내활동 (생기부 연계):</strong>
            <div style={{marginTop:8,display:"flex",flexWrap:"wrap",gap:6}}>
              {s.cross?.acts?.map(a=><span key={a} style={{padding:"4px 12px",borderRadius:6,background:"rgba(99,102,241,.15)",border:"1px solid rgba(99,102,241,.25)",fontSize:12.5,color:"#C7D2FE"}}>{a}</span>)}
            </div>
          </div>
        </div>
        <div className="div"/>
      </>}


      {/* 총평 */}
      <div className="print-section sec-b summary-box">
        <div className="sec-t" style={{color:"rgba(110,231,183,.75)"}}>✦ 진로 종합 총평</div>
        <p style={{fontSize:13.5,color:"rgba(220,252,231,.85)",lineHeight:2,marginBottom:16}}>
          <strong style={{color:"#6EE7B7"}}>{s.info?.name}</strong>님의 검사를 종합하면,
          <strong style={{color:"#6EE7B7"}}> {r1i?.name}({s.r1}) + {r2i?.name}({s.r2})</strong> 흥미에
          <strong style={{color:"#6EE7B7"}}> {mi1i?.name}</strong>이 결합된 강점 프로파일입니다.
          {t1i&&<> <strong style={{color:"#6EE7B7"}}>{t1i.name}</strong> 계열 진출 적합도가 높으며,</>}
          {s.mbtiType&&<> <strong style={{color:"#6EE7B7"}}>{s.mbtiType}</strong> 성격 특성이 진로 선택에 중요한 방향성을 제시합니다.</>}
          {" "}가치관으로는 <strong style={{color:"#6EE7B7"}}>{s.valueTop?.[0]}</strong>을 가장 중요하게 여기므로 이를 충족하는 진로 설계가 필요합니다.
        </p>
        <div style={{marginBottom:12}}>
          <div style={{fontSize:10,color:"rgba(110,231,183,.65)",letterSpacing:2,marginBottom:8,fontFamily:"'Gmarket Sans',sans-serif"}}>⭐ 최우선 추천 전공</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
            {s.cross?.majors?.slice(0,5).map((m,i)=>(
              <span key={m} style={{padding:"6px 14px",borderRadius:99,fontSize:12.5,fontWeight:600,background:"rgba(52,211,153,.15)",border:"1px solid rgba(52,211,153,.35)",color:"#6EE7B7"}}>
                {i===0?"🥇 ":i===1?"🥈 ":i===2?"🥉 ":""}{m}
              </span>
            ))}
          </div>
        </div>
        <div>
          <div style={{fontSize:10,color:"rgba(110,231,183,.65)",letterSpacing:2,marginBottom:8,fontFamily:"'Gmarket Sans',sans-serif"}}>💼 최우선 추천 직업</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
            {s.cross?.jobs?.slice(0,4).map(j=>(
              <span key={j} style={{padding:"6px 14px",borderRadius:99,fontSize:12.5,background:"rgba(52,211,153,.08)",border:"1px solid rgba(52,211,153,.18)",color:"rgba(167,243,208,.9)"}}>✦ {j}</span>
            ))}
          </div>
        </div>
      </div>

      <div style={{fontSize:11,color:"rgba(139,92,246,.4)",lineHeight:1.9,textAlign:"center",marginBottom:16,marginTop:20}}>
        ※ Holland RIASEC · Gardner MI 이론 기반 전문 참고용 검사입니다.<br/>심층 상담을 통해 정확한 진로 설계를 진행해 주세요.
      </div>
      <div className="btn-row no-print">
        {onBack&&<button className="btn btn-g" onClick={onBack}>← {isPublic?"홈":"목록"}</button>}
        <button className="btn" onClick={onPrint}>🖨 PDF 저장</button>
      </div>
    </div></div>
  );
}

const container=document.getElementById("root");
const root=ReactDOM.createRoot(container);
root.render(React.createElement(App));
</script>
</body>
</html>
