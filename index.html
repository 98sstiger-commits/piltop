const S={
  async get(k){
    try{const v=localStorage.getItem(k);if(v)return JSON.parse(v);}catch{}
    return null;
  },
  async set(k,v){
    try{localStorage.setItem(k,JSON.stringify(v));}catch{}
  },
  async del(k){
    try{localStorage.removeItem(k);}catch{}
  },
  async list(pre){
    const keys=[];
    try{for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k?.startsWith(pre))keys.push(k);}}catch{}
    return keys;
  }
};

// ═══════════════════════════════════════════════════════════════
//  ANALYSIS ENGINE
// ═══════════════════════════════════════════════════════════════
function analyze(answers,mbtiMode,mbtiKnown){
  const calcAvg=(qs,dims)=>{
    const sc={},cnt={};
    dims.forEach(d=>{sc[d]=0;cnt[d]=0;});
    qs.forEach(q=>{
      const v=answers[q.id];
      if(v!==undefined&&sc[q.d]!==undefined){sc[q.d]+=Number(v);cnt[q.d]++;}
    });
    dims.forEach(d=>{if(cnt[d]>0)sc[d]=parseFloat((sc[d]/cnt[d]).toFixed(2));});
    return Object.entries(sc).sort(([,a],[,b])=>b-a).map(([k,v])=>({key:k,score:v}));
  };
  const riasec=calcAvg(RQ,["R","I","A","S","E","C"]);
  const mi=calcAvg(MQ,["LI","LM","SP","MU","BK","IP","IA","NA"]);
  const tend=calcAvg(TQ,["HU","SO","SC","EN","AR","ME"]);
  const vals={};
  VQ.forEach(q=>{if(answers[q.id]!==undefined)vals[q.d]=Number(answers[q.id]);});
  const valueTop=Object.entries(vals).sort(([,a],[,b])=>b-a).slice(0,3).map(([k])=>k);

  let mbtiType="";
  if(mbtiMode==="input")mbtiType=mbtiKnown.toUpperCase();
  else if(mbtiMode==="test"){
    const c={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
    BQ.forEach(q=>{const ans=answers[q.id];if(!ans)return;c[ans==="A"?q.av:q.bv]++;});
    mbtiType=`${c.E>=c.I?"E":"I"}${c.S>=c.N?"S":"N"}${c.T>=c.F?"T":"F"}${c.J>=c.P?"J":"P"}`;
  }

  const r1=riasec[0]?.key,r2=riasec[1]?.key,mi1=mi[0]?.key,mi2=mi[1]?.key,tend1=tend[0]?.key;
  const majorSet=new Set(),jobSet=new Set();
  RM[r1]?.majors?.slice(0,4).forEach(m=>majorSet.add(m));
  RM[r2]?.majors?.slice(0,3).forEach(m=>majorSet.add(m));
  RM[r1]?.jobs?.slice(0,3).forEach(j=>jobSet.add(j));
  RM[r2]?.jobs?.slice(0,2).forEach(j=>jobSet.add(j));
  MM[mi1]?.majors?.slice(0,2).forEach(m=>majorSet.add(m));
  MM[mi2]?.majors?.slice(0,1).forEach(m=>majorSet.add(m));

  const pts=[];
  if(r1==="I"&&["LM","NA"].includes(mi1))pts.push("수리·과학 탐구형 → 의약·이공계 연구직 강력 추천");
  if(r1==="I"&&mi1==="LI")pts.push("인문·사회 연구 성향 → 심리학·사회과학 탐색");
  if(r1==="A"&&mi1==="SP")pts.push("시각적 창의력 우수 → 디자인·건축·영상 분야 적합");
  if(r1==="A"&&mi1==="MU")pts.push("음악·퍼포먼스 두드러짐 → 실용음악·공연예술 탐색");
  if(r1==="S"&&mi1==="IP")pts.push("대인관계 탁월 → 교육·상담·사회복지 분야 강점");
  if(r1==="E"&&mi1==="LI")pts.push("리더십 + 언어능력 → 법·경영·정치외교 적합");
  if(r1==="R"&&mi1==="LM")pts.push("공학적 사고 강함 → SW·기계·전자공학 추천");
  if(r1==="C"&&mi1==="LM")pts.push("분석·수리 능력 → 금융·회계·통계·행정 적합");
  if(pts.length===0)pts.push(`${RM[r1]?.name} + ${MM[mi1]?.name} 조합 → ${RM[r1]?.stream} 심화 탐색 권장`);
  if(mbtiType.includes("J"))pts.push("J형: 체계적 학습계획 수립이 강점 — 목표 기반 설계 추천");
  if(mbtiType.includes("P"))pts.push("P형: 탐색적 학습 스타일 — 다양한 체험 후 방향 좁혀가는 전략 적합");
  if(mbtiType.includes("N"))pts.push("N형: 아이디어·창의성 중심 직군 높은 적합도");
  if(mbtiType.includes("T"))pts.push("T형: 논리·분석 기반 직군 적합도 상승");
  if(mbtiType.includes("F"))pts.push("F형: 대인서비스·교육·상담 계열 높은 만족도 예상");

  const acts=[];
  if(["I","R"].includes(r1))acts.push(...["과학탐구대회","R&E 프로젝트","코딩·SW 동아리"]);
  if(r1==="A")acts.push(...["예술·창작 동아리","교지편집부","영상제작 동아리"]);
  if(r1==="S")acts.push(...["교육봉사","멘토링 프로그램","사회복지 동아리"]);
  if(r1==="E")acts.push(...["학생회","창업 동아리","교내 토론대회"]);
  if(r1==="C")acts.push(...["수학올림피아드","경제·금융 동아리","자격증 준비"]);
  if(acts.length<3)acts.push("독서토론","진로체험","교내 발표 활동");

  return{riasec,mi,tend,valueTop,mbtiType,r1,r2,mi1,mi2,tend1,
    cross:{majors:[...majorSet].slice(0,10),jobs:[...jobSet].slice(0,8),pts,acts}};
}

// ═══════════════════════════════════════════════════════════════
//  SVG / CHART COMPONENTS
// ═══════════════════════════════════════════════════════════════
function Radar({items,size=180}){
  const cx=size/2,cy=size/2,r=size*.33,n=items.length;
  const ang=i=>(i*2*Math.PI/n)-Math.PI/2;
  const pt=(i,v)=>[cx+r*(v/5)*Math.cos(ang(i)),cy+r*(v/5)*Math.sin(ang(i))];
  const poly=items.map((it,i)=>pt(i,it.score).join(",")).join(" ");
  return(
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{overflow:"visible"}}>
      {[.25,.5,.75,1].map(lv=>(
        <polygon key={lv} fill="none" stroke="rgba(167,139,250,0.1)" strokeWidth="1"
          points={items.map((_,i)=>[cx+r*lv*Math.cos(ang(i)),cy+r*lv*Math.sin(ang(i))].join(",")).join(" ")}/>
      ))}
      {items.map((_,i)=><line key={i} x1={cx} y1={cy} x2={cx+r*Math.cos(ang(i))} y2={cy+r*Math.sin(ang(i))} stroke="rgba(167,139,250,0.07)" strokeWidth="1"/>)}
      <polygon points={poly} fill="rgba(109,33,176,0.18)" stroke="#7C3AED" strokeWidth="1.5"/>
      {items.map((it,i)=>{const[x,y]=pt(i,it.score);return<circle key={i} cx={x} cy={y} r="3.5" fill="#A78BFA"/>;}) }
      {items.map((it,i)=>{
        const lr=r+20,lx=cx+lr*Math.cos(ang(i)),ly=cy+lr*Math.sin(ang(i));
        return(<g key={i}>
          <text x={lx} y={ly-3} textAnchor="middle" fontSize="11" fill="rgba(215,205,255,.8)">{it.emoji}</text>
          <text x={lx} y={ly+9} textAnchor="middle" fontSize="6.5" fill="rgba(170,150,220,.6)">{it.label}</text>
        </g>);
      })}
    </svg>
  );
}
function Bar({label,score,rank,color}){
  return(
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
      <div style={{flex:1}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
          <span style={{fontSize:12.5,color:rank<2?"#C4B5FD":"rgba(170,155,220,.5)",fontWeight:rank<2?600:400}}>{label}</span>
          <span style={{fontSize:11,color:"rgba(145,130,195,.45)"}}>{Math.round(score*20)}점</span>
        </div>
        <div style={{height:4,background:"rgba(255,255,255,.07)",borderRadius:99,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${(score/5)*100}%`,borderRadius:99,transition:"width .6s",
            background:rank===0?color:rank===1?color+"88":"rgba(255,255,255,.13)"}}/>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  DELETE ROW  (🗑 버튼 항상 표시)
// ═══════════════════════════════════════════════════════════════
function DelRow({children,onDelete}){
  const [confirm,setConfirm]=useState(false);
  return(
    <div style={{display:"flex",alignItems:"stretch",gap:0,marginBottom:2,borderRadius:10,overflow:"hidden",
      background:"rgba(255,255,255,.025)"}}>
      <div style={{flex:1,minWidth:0}}>{children}</div>
      <button
        onClick={()=>{if(confirm)onDelete();else{setConfirm(true);setTimeout(()=>setConfirm(false),2500);}}}
        style={{flexShrink:0,width:48,border:"none",cursor:"pointer",transition:"all .18s",
          background:confirm?"rgba(239,68,68,.25)":"rgba(255,255,255,.03)",
          borderLeft:"1px solid rgba(255,255,255,.06)",
          display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2}}>
        <span style={{fontSize:16}}>{confirm?"❗":"🗑"}</span>
        <span style={{fontSize:8.5,color:confirm?"#FCA5A5":"rgba(180,160,220,.35)",fontWeight:600,letterSpacing:.3}}>
          {confirm?"확인":"삭제"}
        </span>
      </button>
    </div>
  );
}

.ab-opt:hover,.ab-opt.a{background:rgba(109,33,176,.14);border-color:rgba(167,139,250,.38);}

/* Code badge */

  padding:12px 24px;border-radius:12px;background:rgba(109,33,176,.92);border:1px solid rgba(167,139,250,.3);
  color:#DDD6FE;font-size:13px;font-weight:600;backdrop-filter:blur(12px);

`;

const SECS=[
  {key:"riasec",label:"흥미 유형",sub:"Holland RIASEC",icon:"🎯",qs:RQ,type:"likert"},
  {key:"mi",label:"다중지능",sub:"Gardner MI",icon:"🧩",qs:MQ,type:"likert"},
  {key:"tendency",label:"계열 성향",sub:"Academic Tendency",icon:"📐",qs:TQ,type:"likert"},
  {key:"values",label:"직업 가치관",sub:"Career Values",icon:"💎",qs:VQ,type:"likert"},
  {key:"mbti_test",label:"성격 유형",sub:"MBTI",icon:"🪪",qs:BQ,type:"ab"},
];
const SCALE=[
  {v:1,e:"😑",t:"전혀\n아니다"},
  {v:2,e:"🙁",t:"아닌\n편이다"},
  {v:3,e:"😐",t:"보통\n이다"},
  {v:4,e:"🙂",t:"그런\n편이다"},
  {v:5,e:"😄",t:"매우\n그렇다"},
];
const MBTI_TYPES=["INTJ","INTP","ENTJ","ENTP","INFJ","INFP","ENFJ","ENFP","ISTJ","ISFJ","ESTJ","ESFJ","ISTP","ISFP","ESTP","ESFP"];

// ═══════════════════════════════════════════════════════════════
//  MAIN APP
// ═══════════════════════════════════════════════════════════════
function App(){
  const [view,setView]=useState("loading");
  const [token,setToken]=useState(null);
  const [tokenData,setTokenData]=useState(null);
  const [info,setInfo]=useState({name:"",grade:"",school:"",studentPhone:"",parentPhone:""});
  const [answers,setAnswers]=useState({});
  const [secIdx,setSecIdx]=useState(0);
  const [qIdx,setQIdx]=useState(0);
  const [mbtiMode,setMbtiMode]=useState(null);
  const [mbtiKnown,setMbtiKnown]=useState("");
  const [animKey,setAnimKey]=useState(0);
  const [adminAuth,setAdminAuth]=useState(false);
  const [adminPw,setAdminPw]=useState("");
  const [adminErr,setAdminErr]=useState(false);
  const [adminTab,setAdminTab]=useState("subs");
  const [links,setLinks]=useState([]);
  const [subs,setSubs]=useState([]);
  const [selSub,setSelSub]=useState(null);
  const [logo,setLogo]=useState(null);
  const [toast,setToast]=useState("");
  const [newLabel,setNewLabel]=useState("");
  const logoRef=useRef();
  const toastRef=useRef();

  const showToast=msg=>{setToast(msg);clearTimeout(toastRef.current);toastRef.current=setTimeout(()=>setToast(""),2600);};

  const activeSecs=mbtiMode==="test"?SECS:SECS.filter(s=>s.key!=="mbti_test");
  const curSec=activeSecs[secIdx];
  const curQ=curSec?.qs[qIdx];

  // ── URL routing ──
  useEffect(()=>{
    (async()=>{
      const cfg=await S.get(K.cfg());
      if(cfg?.logo)setLogo(cfg.logo);
      const hash=window.location.hash.slice(1);
      if(!hash){setView("home");return;}
      if(hash==="admin"){setView("admin");return;}
      if(hash.startsWith("r/")){
        const t=decodeURIComponent(hash.slice(2));
        const d=await S.get(K.link(t));
        if(d?.submission){setSelSub(d.submission);setView("result_pub");}
        else setView("home");
        return;
      }
      const t=decodeURIComponent(hash);
      const d=await S.get(K.link(t));
      if(!d){setView("home");return;}
      setToken(t);setTokenData(d);
      if(d.status==="used"){setSelSub(d.submission);setView("already");}
      else setView("start");
    })();
  },[]);

  // ── Answer handlers ──
  function advance(newAns){
    if(qIdx<curSec.qs.length-1){setQIdx(q=>q+1);}
    else if(secIdx<activeSecs.length-1){setSecIdx(s=>s+1);setQIdx(0);}
    else doSubmit(newAns);
  }
  function handleLikert(score){
    const nAns={...answers,[curQ.id]:score};
    setAnswers(nAns);setAnimKey(k=>k+1);
    setTimeout(()=>advance(nAns),260);
  }
  function handleAB(ch){
    const nAns={...answers,[curQ.id]:ch};
    setAnswers(nAns);setAnimKey(k=>k+1);
    setTimeout(()=>advance(nAns),260);
  }

  async function doSubmit(allAns){
    const result=analyze(allAns,mbtiMode,mbtiKnown);
    const id=token||mkCode();
    const submission={id,token:id,submittedAt:new Date().toLocaleString("ko-KR"),info,...result};
    const record={token:id,label:info.name||tokenData?.label||id,status:"used",
      createdAt:tokenData?.createdAt||new Date().toLocaleString("ko-KR"),submission};
    await S.set(K.link(id),record);
    if(!token){
      const ll=await S.get(K.links())||[];
      if(!ll.includes(id))ll.unshift(id);
      await S.set(K.links(),ll);
    }
    setView("done");
  }

  // ── Admin ──
  async function adminLogin(){
    if(adminPw===APW){setAdminAuth(true);setAdminErr(false);await loadAdmin();}
    else setAdminErr(true);
  }
  async function loadAdmin(){
    const ll=await S.get(K.links())||[];
    const recs=[];
    for(const t of ll){const d=await S.get(K.link(t));if(d)recs.push(d);}
    recs.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
    setLinks(recs);
    setSubs(recs.filter(d=>d.status==="used"&&d.submission).map(d=>d.submission));
  }
  async function createLink(){
    const t=mkCode();
    const d={token:t,label:newLabel||"(이름 미입력)",status:"pending",createdAt:new Date().toLocaleString("ko-KR"),submission:null};
    await S.set(K.link(t),d);
    const ll=await S.get(K.links())||[];
    ll.unshift(t);await S.set(K.links(),ll);
    setNewLabel("");await loadAdmin();
    showToast("✅ 링크가 생성되었습니다!");
  }
  async function deleteRecord(t){
    await S.del(K.link(t));
    const ll=await S.get(K.links())||[];
    const next=ll.filter(k=>k!==t);
    await S.set(K.links(),next);
    await loadAdmin();
    showToast("🗑 삭제되었습니다.");
  }
  async function uploadLogo(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=async ev=>{
      const d=ev.target.result;setLogo(d);
      const cfg=await S.get(K.cfg())||{};cfg.logo=d;
      await S.set(K.cfg(),cfg);showToast("🖼 로고가 저장되었습니다!");
    };
    reader.readAsDataURL(file);
  }

  // ── URL helpers ──
  const baseUrl=()=>{try{const u=new URL(window.location.href);u.hash="";return u.toString();}catch{return "";}}
  const testUrl=t=>`${baseUrl()}#${encodeURIComponent(t)}`;
  const resultUrl=t=>`${baseUrl()}#r/${encodeURIComponent(t)}`;
  const copyLink=(url)=>{try{navigator.clipboard.writeText(url);showToast("🔗 링크가 복사되었습니다!");}catch{showToast(url);}};

  // ── Logo component ──
  const LogoRow=()=>(
    <div className="logo-row">
      <div className="logo-box">{logo?<img src={logo} alt="logo"/>:"✦"}</div>
      <div>
        <div className="logo-name"><span className="p">PIL</span><span className="t">TOP</span></div>
        <div className="logo-tag">Career Compass</div>
      </div>
    </div>
  );

  const SegProgress=()=>{
    const total=activeSecs.reduce((s,sec)=>s+sec.qs.length,0);
    const done=activeSecs.slice(0,secIdx).reduce((s,sec)=>s+sec.qs.length,0)+qIdx;
    return(
      <div>
        <div className="segs">
          {activeSecs.map((s,i)=>{
            const fill=i<secIdx?100:i===secIdx?Math.round((qIdx/s.qs.length)*100):0;
            return<div key={s.key} className="seg"><div className="seg-f" style={{width:`${fill}%`}}/></div>;
          })}
        </div>
        <div className="prog-meta">
          <span>{curSec?.icon} {curSec?.label} · {curSec?.sub}</span>
          <span>{done+1} / {total}</span>
        </div>
      </div>
    );
  };

  // ════════════════════════════════
  //  RENDER
  // ════════════════════════════════
  return(
    <>
    <style>{CSS}</style>
    {toast&&<div className="toast no-print">{toast}</div>}

    {/* LOADING */}
    {view==="loading"&&<div className="root"><div className="card fu"><LogoRow/><p className="muted">불러오는 중...</p></div></div>}

    {/* HOME */}
    {view==="home"&&(
      <div className="root"><div className="card fu">
        <LogoRow/>
        <h1>나의 진로를<br/>발견하는 여정</h1>
        <p className="muted">
          선생님께 받은 링크를 클릭하면<br/>바로 검사가 시작됩니다.
        </p>
        <div style={{marginTop:20,textAlign:"center"}}>
          <button className="btn-g btn btn-sm" style={{margin:"0 auto"}}
            onClick={()=>{window.location.hash="admin";setView("admin");}}>🔐 관리자</button>
        </div>
      </div></div>
    )}

    {/* START (token valid) */}
    {view==="start"&&(
      <div className="root"><div className="card fu">
        <LogoRow/>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:52,marginBottom:14}}>🎯</div>
          <h2 style={{marginBottom:6}}>검사 코드 확인 완료</h2>
          {tokenData?.label&&<p style={{fontSize:14,color:"rgba(190,175,255,.6)"}}>{tokenData.label}님을 위한 검사입니다</p>}
          <div style={{marginTop:10}}><span className="code-badge">{token}</span></div>
        </div>
        <div className="badge-row" style={{justifyContent:"center"}}>
          <span className="badge">📋 최대 99문항</span>
          <span className="badge">⏱ 약 15~20분</span>
          <span className="badge">🔬 5개 영역 분석</span>
        </div>
        <button className="btn" onClick={()=>setView("info")}>검사 시작하기 →</button>
      </div></div>
    )}

    {/* ALREADY USED */}
    {view==="already"&&(
      <div className="root"><div className="card fu">
        <LogoRow/>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:52,marginBottom:14}}>🔒</div>
          <h2>이미 제출된 검사입니다</h2>
          <p className="muted">이 코드로 이미 검사가 완료되었습니다.<br/>선생님께 문의해 주세요.</p>
          <button className="btn btn-g btn-sm" style={{margin:"0 auto"}} onClick={()=>{setView("home");window.location.hash="";}}>← 처음으로</button>
        </div>
      </div></div>
    )}

    {/* INFO — 학생 정보 입력 */}
    {view==="info"&&(
      <div className="root"><div className="card fu">
        <LogoRow/>
        <h2>기본 정보 입력</h2>
        <p className="muted">정확한 분석을 위해 아래 정보를 모두 입력해 주세요.</p>

        <div className="inp-g">
          <div className="inp-l">학생 이름 *</div>
          <input className="inp" placeholder="홍길동" value={info.name} onChange={e=>setInfo({...info,name:e.target.value})}/>
          {tokenData?.label && info.name && info.name.trim() !== tokenData.label.trim() && (
            <div style={{marginTop:7,padding:"8px 12px",borderRadius:9,background:"rgba(239,68,68,.12)",
              border:"1px solid rgba(239,68,68,.25)",fontSize:12.5,color:"#FCA5A5"}}>
              ⚠️ 학생 정보가 다릅니다. 선생님께 받은 이름을 정확히 입력해 주세요.
            </div>
          )}
        </div>

        <div className="inp-g">
          <div className="inp-l">학교명</div>
          <input className="inp" placeholder="예) 필탑중학교" value={info.school} onChange={e=>setInfo({...info,school:e.target.value})}/>
        </div>

        <div className="inp-g">
          <div className="inp-l" style={{marginBottom:10}}>학년 *</div>
          <div className="g-grid">
            {["중1","중2","중3","고1","고2","고3"].map(g=>(
              <button key={g} className={`g-btn ${info.grade===g?"sel":""}`} onClick={()=>setInfo({...info,grade:g})}>{g}</button>
            ))}
          </div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div className="inp-g" style={{marginBottom:0}}>
            <div className="inp-l">학생 연락처</div>
            <input className="inp" placeholder="010-0000-0000" value={info.studentPhone}
              onChange={e=>setInfo({...info,studentPhone:e.target.value})}/>
          </div>
          <div className="inp-g" style={{marginBottom:0}}>
            <div className="inp-l">학부모 연락처</div>
            <input className="inp" placeholder="010-0000-0000" value={info.parentPhone}
              onChange={e=>setInfo({...info,parentPhone:e.target.value})}/>
          </div>
        </div>

        <div className="btn-row" style={{marginTop:22}}>
          <button className="btn btn-g" onClick={()=>setView("start")}>← 이전</button>
          <button className="btn" disabled={!info.name||!info.grade||(tokenData?.label&&info.name.trim()!==tokenData.label.trim())} onClick={()=>setView("mbti_choice")}>다음 →</button>
        </div>
      </div></div>
    )}

    {/* MBTI CHOICE */}
    {view==="mbti_choice"&&(
      <div className="root"><div className="card fu">
        <LogoRow/>
        <h2>MBTI 성격 유형</h2>
        <p className="muted">MBTI를 알고 계신가요?</p>
        <div className="ab-opts" style={{marginBottom:20}}>
          {[
            {mode:"input",l:"이미 알고 있어요",t:"✅  직접 선택할게요"},
            {mode:"test",l:"잘 모르겠어요",t:"🧪  16문항 검사로 확인할게요"},
            {mode:"skip",l:"건너뛰기",t:"⏭  MBTI 없이 진행할게요"},
          ].map(({mode,l,t})=>(
            <button key={mode} className="ab-opt" onClick={()=>{
              setMbtiMode(mode);
              if(mode==="input")setView("mbti_input");
              else{setSecIdx(0);setQIdx(0);setView("test");}
            }}>
              <div className="ab-label">{l}</div>
              <div className="ab-text">{t}</div>
            </button>
          ))}
        </div>
        <button className="btn btn-g" onClick={()=>setView("info")}>← 이전</button>
      </div></div>
    )}

    {/* MBTI INPUT */}
    {view==="mbti_input"&&(
      <div className="root"><div className="card fu">
        <LogoRow/>
        <h2>MBTI 유형 선택</h2>
        <div className="g-grid" style={{gridTemplateColumns:"repeat(4,1fr)",marginBottom:16}}>
          {MBTI_TYPES.map(t=>(
            <button key={t} className={`g-btn ${mbtiKnown===t?"sel":""}`} style={{padding:"12px 4px",fontSize:12}} onClick={()=>setMbtiKnown(t)}>{t}</button>
          ))}
        </div>
        {mbtiKnown&&<div style={{marginBottom:16,padding:"10px 16px",borderRadius:10,
          background:"rgba(109,33,176,.12)",border:"1px solid rgba(167,139,250,.2)",fontSize:13,color:"#C4B5FD"}}>
          {mbtiKnown} — {MBTI_DESC[mbtiKnown]}
        </div>}
        <div className="btn-row">
          <button className="btn btn-g" onClick={()=>setView("mbti_choice")}>← 이전</button>
          <button className="btn" disabled={!mbtiKnown} onClick={()=>{setSecIdx(0);setQIdx(0);setView("test");}}>시작 →</button>
        </div>
      </div></div>
    )}

    {/* TEST */}
    {view==="test"&&curSec&&curQ&&(
      <div className="root"><div className="card">
        <LogoRow/>
        <SegProgress/>
        <div key={`${secIdx}-${qIdx}-${animKey}`} className="fl">
          <div className="sec-tag"><span>{curSec.icon}</span><span>{curSec.label} · {curSec.sub}</span></div>
          <div className="q-text">{curQ.t}</div>
          {curSec.type==="likert"&&(
            <div className="scale">
              {SCALE.map(({v,e,t})=>(
                <div key={v} className="sc-item">
                  <button className={`sc-btn ${answers[curQ.id]===v?"a":""}`} dv={`${v}`} onClick={()=>handleLikert(v)}>
                    <span className="sc-em">{e}</span>
                    <span className="sc-txt">{t}</span>
                  </button>
                </div>
              ))}
            </div>
          )}
          {curSec.type==="ab"&&(
            <div className="ab-opts">
              {[{ch:"A",text:curQ.a},{ch:"B",text:curQ.b}].map(({ch,text})=>(
                <button key={ch} className={`ab-opt ${answers[curQ.id]===ch?"a":""}`} onClick={()=>handleAB(ch)}>
                  <div className="ab-label">{ch}</div>
                  <div className="ab-text">{text}</div>
                </button>
              ))}
            </div>
          )}
        </div>
        {(qIdx>0||(secIdx>0&&qIdx===0))&&(
          <button className="btn btn-g no-print" style={{marginTop:18,fontSize:13}}
            onClick={()=>{
              if(qIdx>0)setQIdx(i=>i-1);
              else{setSecIdx(s=>s-1);setQIdx(activeSecs[secIdx-1].qs.length-1);}
              setAnimKey(k=>k+1);
            }}>← 이전 문항</button>
        )}
      </div></div>
    )}

    {/* DONE */}
    {view==="done"&&(
      <div className="root"><div className="card fu">
        <LogoRow/>
        <div style={{textAlign:"center",padding:"20px 0"}}>
          <div style={{fontSize:64,marginBottom:16}}>🎉</div>
          <h1 style={{fontSize:26,marginBottom:12}}>검사 완료!</h1>
          <p className="muted">
            <strong style={{color:"#C4B5FD"}}>{info.name}</strong>님의 진로 검사가<br/>
            성공적으로 제출되었습니다.<br/><br/>
            결과는 담당 선생님이 먼저 검토한 후<br/>
            상담 시 함께 안내해 드립니다 🙏
          </p>
          <div style={{padding:"14px 18px",borderRadius:12,background:"rgba(109,33,176,.1)",
            border:"1px solid rgba(167,139,250,.18)",fontSize:13,color:"rgba(195,185,255,.7)",lineHeight:1.8,marginBottom:22}}>
            📞 문의·상담 예약은 담당 선생님께 연락해 주세요
          </div>
        </div>
      </div></div>
    )}

    {/* RESULT PUBLIC */}
    {view==="result_pub"&&selSub&&(
      <ResultView sub={selSub} logo={logo} isPublic
        onBack={()=>{setSelSub(null);setView("home");window.location.hash="";}}
        onPrint={()=>window.print()}/>
    )}

    {/* ADMIN */}
    {view==="admin"&&!adminAuth&&(
      <div className="root"><div className="card fu" style={{maxWidth:400}}>
        <LogoRow/>
        <h2>관리자 로그인</h2>
        <div className="inp-g" style={{marginTop:16}}>
          <div className="inp-l">비밀번호</div>
          <input className="inp" type="password" placeholder="••••••••" value={adminPw}
            onChange={e=>{setAdminPw(e.target.value);setAdminErr(false);}}
            onKeyDown={e=>e.key==="Enter"&&adminLogin()}/>
          {adminErr&&<div style={{color:"#EF4444",fontSize:12,marginTop:6}}>비밀번호가 올바르지 않습니다.</div>}
        </div>
        <div className="btn-row" style={{marginTop:8}}>
          <button className="btn btn-g" onClick={()=>{setView("home");window.location.hash="";}}>← 이전</button>
          <button className="btn" onClick={adminLogin}>로그인</button>
        </div>
      </div></div>
    )}

    {/* ADMIN DASHBOARD */}
    {view==="admin"&&adminAuth&&!selSub&&(
      <div className="root top"><div className="card wide">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}} className="no-print">
          <LogoRow/>
          <div style={{display:"flex",gap:8}}>
            <button className="btn btn-g btn-sm" onClick={loadAdmin}>🔄</button>
            <button className="btn btn-g btn-sm" onClick={()=>{setAdminAuth(false);setAdminPw("");window.location.hash="";}}>로그아웃</button>
          </div>
        </div>

        <div className="tabs no-print">
          {[{k:"subs",l:"📋 제출 결과"},{k:"links",l:"🔗 링크 관리"},{k:"settings",l:"⚙️ 설정"}].map(({k,l})=>(
            <button key={k} className={`tab ${adminTab===k?"on":""}`} onClick={()=>setAdminTab(k)}>{l}</button>
          ))}
        </div>

        {/* ── 제출 결과 탭 ── */}
        {adminTab==="subs"&&(
          <>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:22}}>
            {[["총 제출",subs.length],["고등학생",subs.filter(s=>s.info?.grade?.startsWith("고")).length],["중학생",subs.filter(s=>s.info?.grade?.startsWith("중")).length]].map(([l,n])=>(
              <div key={l} style={{textAlign:"center",padding:"16px",background:"rgba(109,33,176,.08)",border:"1px solid rgba(167,139,250,.1)",borderRadius:12}}>
                <div style={{fontFamily:"'Gmarket Sans',sans-serif",fontSize:30,fontWeight:700,color:"#C4B5FD"}}>{n}</div>
                <div style={{fontSize:9.5,color:"rgba(155,140,210,.5)",letterSpacing:1,marginTop:3}}>{l}</div>
              </div>
            ))}
          </div>
          {subs.length===0?(
            <div style={{textAlign:"center",padding:"40px 0",color:"rgba(160,140,220,.3)",fontSize:14}}>아직 제출된 검사가 없습니다.</div>
          ):(
            <div>
              {subs.map(s=>(
                <DelRow key={s.id} onDelete={()=>deleteRecord(s.token||s.id)}>
                  <div className="srow-in" style={{cursor:"pointer"}} onClick={()=>setSelSub(s)}>
                    <div style={{width:36,height:36,borderRadius:10,background:"rgba(109,33,176,.18)",
                      display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>👤</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                        <span style={{fontFamily:"'Gmarket Sans',sans-serif",fontWeight:700,color:"#C4B5FD",fontSize:15}}>{s.info?.name}</span>
                        <span style={{fontSize:11,color:"rgba(170,150,220,.5)"}}>{s.info?.grade}</span>
                        <span style={{fontFamily:"'Gmarket Sans',sans-serif",fontSize:12,color:"#A78BFA",fontWeight:700}}>{s.r1}{s.r2}형</span>
                      </div>
                      <div style={{fontSize:11,color:"rgba(150,130,190,.45)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                        {s.info?.school||""}{s.mbtiType?` · ${s.mbtiType}`:""} · {s.submittedAt}
                      </div>
                    </div>
                    <div style={{fontSize:11,color:"rgba(167,139,250,.4)"}}>›</div>
                  </div>
                </DelRow>
              ))}
            </div>
          )}
          </>
        )}

        {/* ── 링크 관리 탭 ── */}
        {adminTab==="links"&&(
          <>
          <h2 style={{marginBottom:8}}>링크 생성</h2>
          <p className="muted" style={{fontSize:13}}>
            검사를 진행할 학생 이름을 입력하고 링크를 생성하세요.<br/>
            생성된 링크는 1인 전용이며, 한 번 제출되면 자동으로 잠깁니다.
          </p>
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            <input className="inp" placeholder="학생 이름 또는 메모" value={newLabel}
              onChange={e=>setNewLabel(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&createLink()} style={{flex:1}}/>
            <button className="btn btn-sm" style={{flex:"none"}} onClick={createLink}>+ 생성</button>
          </div>
          <p className="hint" style={{marginBottom:20,textAlign:"left"}}>링크 복사 후 카카오톡·문자로 학생에게 전송하세요. 제출 완료 시 결과링크가 활성화됩니다.</p>

          {links.length===0?(
            <div style={{textAlign:"center",padding:"30px 0",color:"rgba(160,140,220,.3)",fontSize:14}}>생성된 링크가 없습니다.</div>
          ):(
            <div>
              {links.map(d=>(
                <DelRow key={d.token} onDelete={()=>deleteRecord(d.token)}>
                  <div className="srow-in">
                    <div className={`status-dot ${d.status==="used"?"status-done":"status-wait"}`}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                        <span style={{fontWeight:700,color:"#DDD6FE",fontSize:14}}>{d.label}</span>
                        <span className="code-badge">{d.token}</span>
                      </div>
                      <div style={{fontSize:11,color:"rgba(150,130,190,.45)"}}>{d.createdAt}</div>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:5,flexShrink:0}}>
                      <button className="btn btn-sm" style={{padding:"6px 12px",fontSize:11}}
                        onClick={()=>copyLink(testUrl(d.token))}>🔗 링크 복사</button>
                      {d.status==="used"&&(
                        <button className="btn btn-g btn-sm" style={{padding:"6px 12px",fontSize:11}}
                          onClick={()=>copyLink(resultUrl(d.token))}>📊 결과링크</button>
                      )}
                    </div>
                  </div>
                </DelRow>
              ))}
            </div>
          )}
          </>
        )}

        {/* ── 설정 탭 ── */}
        {adminTab==="settings"&&(
          <>
          <h2 style={{marginBottom:8}}>학원 로고</h2>
          <p className="muted">검사 화면 상단에 표시될 로고를 업로드하세요.</p>
          <div style={{display:"flex",alignItems:"center",gap:20,marginBottom:28}}>
            <div style={{width:80,height:80,borderRadius:16,overflow:"hidden",
              background:"linear-gradient(140deg,#6B21A8,#9333EA)",
              display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,flexShrink:0}}>
              {logo?<img src={logo} style={{width:"100%",height:"100%",objectFit:"contain"}}/>:"✦"}
            </div>
            <div>
              <button className="btn btn-sm" style={{width:"auto"}} onClick={()=>logoRef.current?.click()}>📁 로고 업로드</button>
              <p style={{fontSize:11,color:"rgba(160,140,220,.45)",marginTop:8}}>PNG · JPG · SVG 권장 · 정사각형 이미지 최적</p>
              <input ref={logoRef} type="file" accept="image/*" style={{display:"none"}} onChange={uploadLogo}/>
            </div>
          </div>
          <div className="div"/>
          <h2 style={{marginBottom:8}}>학원 정보</h2>
          <div style={{padding:"14px 18px",borderRadius:12,background:"rgba(255,255,255,.04)",
            border:"1px solid rgba(167,139,250,.1)",fontSize:13,color:"rgba(195,185,255,.7)",lineHeight:2.2}}>
            학원 ID · 브랜드: <strong style={{color:"#A78BFA"}}>{BRAND}</strong><br/>
            생성되는 코드 형식: <strong style={{color:"#A78BFA",fontFamily:"'Gmarket Sans',sans-serif"}}>{BRAND}-XXXXXXXX</strong><br/>
            관리자 비밀번호: <strong style={{color:"#A78BFA"}}>{APW}</strong><br/>
          </div>
          <div style={{marginTop:12,padding:"12px 16px",borderRadius:10,background:"rgba(245,158,11,.08)",
            border:"1px solid rgba(245,158,11,.2)",fontSize:12,color:"rgba(253,211,77,.7)",lineHeight:1.8}}>
            💡 다른 학원용 페이지를 원하시면 별도 문의해 주세요.<br/>
            각 학원은 완전히 분리된 독립 페이지로 운영됩니다.
          </div>
          </>
        )}
      </div></div>
    )}

    {/* ADMIN DETAIL */}
    {view==="admin"&&adminAuth&&selSub&&(
      <ResultView sub={selSub} logo={logo}
        onBack={()=>setSelSub(null)}
        onPrint={()=>window.print()}
        resultLink={resultUrl(selSub.token||selSub.id)}
        copyLink={copyLink}/>
    )}
    </>
  );
}

// ═══════════════════════════════════════════════════════════════
//  RESULT VIEW
// ═══════════════════════════════════════════════════════════════
function ResultView({sub,logo,onBack,onPrint,isPublic,resultLink,copyLink}){
  const s=sub;
  const r1i=RM[s.r1],r2i=RM[s.r2],mi1i=MM[s.mi1],t1i=TM[s.tend1];
  const radarR=s.riasec?.map(({key,score})=>({emoji:RM[key]?.emoji||"",label:RM[key]?.name||"",score}));
  const radarMI=s.mi?.map(({key,score})=>({emoji:MM[key]?.emoji||"",label:(MM[key]?.name||"").replace("지능","").slice(0,4),score}));
  const LogoBox=()=>(
    <div className="logo-row" style={{marginBottom:0}}>
      <div className="logo-box">{logo?<img src={logo} alt="logo"/>:"✦"}</div>
      <div><div className="logo-name"><span className="p">PIL</span><span className="t">TOP</span></div><div className="logo-tag">Career Compass</div></div>
    </div>
  );
  return(
    <div className="root top"><div className="card wide">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}} className="no-print">
        <LogoBox/>
        <div style={{display:"flex",gap:8}}>
          {!isPublic&&resultLink&&copyLink&&<button className="btn btn-g btn-sm" onClick={()=>copyLink(resultLink)}>🔗 결과공유</button>}
          <button className="btn btn-sm" onClick={onPrint}>🖨 PDF</button>
          {onBack&&<button className="btn btn-g btn-sm" onClick={onBack}>← 목록</button>}
        </div>
      </div>

      {/* 학생 카드 */}
      <div style={{display:"flex",gap:16,alignItems:"center",padding:"16px 20px",
        background:"rgba(109,33,176,.08)",border:"1px solid rgba(167,139,250,.13)",borderRadius:16,marginBottom:24}}>
        <div style={{fontSize:44}}>👤</div>
        <div style={{flex:1}}>
          <div style={{fontFamily:"'Gmarket Sans',sans-serif",fontSize:22,fontWeight:700,color:"#DDD6FE"}}>{s.info?.name}</div>
          <div style={{fontSize:13,color:"rgba(170,150,220,.6)",marginTop:3,lineHeight:1.8}}>
            {s.info?.grade}{s.info?.school?` · ${s.info.school}`:""}
            {s.info?.studentPhone?<><br/>학생 {s.info.studentPhone}</>:""}
            {s.info?.parentPhone?<span style={{marginLeft:12}}>학부모 {s.info.parentPhone}</span>:""}
          </div>
          <div style={{fontSize:11,color:"rgba(140,120,180,.45)",marginTop:3}}>제출 {s.submittedAt}</div>
        </div>
        {s.mbtiType&&(
          <div style={{textAlign:"center",padding:"10px 16px",background:"rgba(109,33,176,.15)",
            border:"1px solid rgba(167,139,250,.2)",borderRadius:12,flexShrink:0}}>
            <div style={{fontFamily:"'Gmarket Sans',sans-serif",fontSize:26,fontWeight:700,color:"#A78BFA"}}>{s.mbtiType}</div>
            <div style={{fontSize:9.5,color:"rgba(160,140,220,.55)",marginTop:3}}>{MBTI_DESC[s.mbtiType]||""}</div>
          </div>
        )}
      </div>

      {/* Hero */}
      <div className="r-hero">
        <div className="r-code">{s.r1}{s.r2}형</div>
        <div>
          <span className="pill">{r1i?.stream}</span>
          {r2i?.stream&&r2i.stream!==r1i?.stream&&<span className="pill">{r2i.stream}</span>}
          {t1i&&<span className="pill">{t1i.emoji} {t1i.name}</span>}
          {s.mbtiType&&<span className="pill">{s.mbtiType}</span>}
        </div>
        <div style={{marginTop:12,fontSize:13,color:"rgba(175,162,255,.65)",lineHeight:1.75}}>{r1i?.desc}</div>
      </div>

      {/* Radars */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:20}}>
        {[{title:"RIASEC 흥미 유형",items:radarR},{title:"다중지능 프로파일",items:radarMI}].map(({title,items})=>(
          <div key={title} style={{background:"rgba(255,255,255,.025)",border:"1px solid rgba(167,139,250,.08)",borderRadius:14,padding:16,textAlign:"center"}}>
            <div className="sec-t" style={{marginBottom:10}}>{title}</div>
            {items&&<Radar items={items} size={185}/>}
          </div>
        ))}
      </div>

      {/* Bars */}
      {[
        {title:"흥미 유형 (RIASEC)",data:s.riasec,map:RM},
        {title:"다중지능",data:s.mi,map:MM},
        {title:"계열 성향",data:s.tend,map:TM},
      ].map(({title,data,map})=>(
        <div key={title}>
          <div className="sec-b">
            <div className="sec-t">{title}</div>
            {data?.map(({key,score},i)=>(
              <Bar key={key} label={`${map[key]?.emoji} ${map[key]?.name}`} score={score} rank={i} color={map[key]?.color||"#7C3AED"}/>
            ))}
          </div>
          <div className="div"/>
        </div>
      ))}

      {/* Values */}
      <div className="sec-b">
        <div className="sec-t">직업 가치관 Top 3</div>
        <div className="tags">
          {s.valueTop?.map((v,i)=><span key={v} className={`tag ${i===0?"hi":""}`}>{["🥇","🥈","🥉"][i]} {v}</span>)}
        </div>
      </div>
      <div className="div"/>

      {/* Recommend */}
      <div className="sec-b">
        <div className="sec-t">🎯 추천 학과·전공</div>
        <div className="tags" style={{marginBottom:16}}>
          {s.cross?.majors?.map((m,i)=><span key={m} className={`tag ${i<3?"hi":""}`}>{m}</span>)}
        </div>
        <div className="sec-t">💼 추천 직업군</div>
        <div className="tags">
          {s.cross?.jobs?.map(j=><span key={j} className="tag">{j}</span>)}
        </div>
      </div>
      <div className="div"/>

      {/* Counseling (admin only) */}
      {!isPublic&&(
        <>
        <div className="sec-b">
          <div className="sec-t">💬 상담 포인트 (선생님 전용)</div>
          <div className="adv">
            <strong>RIASEC: {s.r1}{s.r2} · MI: {mi1i?.name} · 계열: {t1i?.name||"—"} · MBTI: {s.mbtiType||"—"}</strong>
            <br/><br/>
            {s.cross?.pts?.map((p,i)=><div key={i} style={{marginBottom:5}}>📌 {p}</div>)}
            <br/>
            <strong>추천 교내활동:</strong> {s.cross?.acts?.join(" · ")}
          </div>
        </div>
        <div className="div"/>
        </>
      )}

      <div style={{fontSize:11,color:"rgba(140,120,180,.4)",lineHeight:1.9,textAlign:"center",marginBottom:16}}>
        ※ Holland RIASEC · Gardner MI 이론 기반 전문 참고용 검사입니다.<br/>심층 상담을 통해 정확한 진로 설계를 진행해 주세요.
      </div>
      <div className="btn-row no-print">
        {onBack&&<button className="btn btn-g" onClick={onBack}>← {isPublic?"홈":"목록"}</button>}
        <button className="btn" onClick={onPrint}>🖨 PDF 저장</button>
      </div>
    </div></div>
  );
}
  const container = document.getElementById("root");
  const root = ReactDOM.createRoot(container);
  root.render(React.createElement(App));
  </script>
</body>
</html>
